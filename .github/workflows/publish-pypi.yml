name: Publish obsigil to PyPI

# Triggers on `v*` tag pushes to this GitHub mirror, then publishes to
# PyPI via OIDC trusted publishing — no API token secret needed on the
# GitHub side.
#
# obsigil is PURE PYTHON: it builds one universal wheel (py3-none-any) +
# an sdist with hatchling, so there is no per-platform wheel matrix (the
# native PyO3 siblings like oboron-py need one; this does not).
#
# One-time setup required before the first publish:
#
# 1. On PyPI. The `obsigil` project does not exist yet, so add a PENDING
#    trusted publisher at https://pypi.org/manage/account/publishing/
#    (after the first publish it becomes a normal publisher under
#    https://pypi.org/manage/project/obsigil/settings/publishing/):
#      PyPI Project Name: obsigil
#      Owner:             deyanovich
#      Repository name:   obsigil-py
#      Workflow name:     publish-pypi.yml
#      Environment name:  pypi
#
# 2. On GitHub (Settings → Environments on deyanovich/obsigil-py):
#    create an environment named `pypi`. Optional protection rules
#    (e.g. require approval before deployment) can be added there.
#
# Release flow: tag `vX.Y.Z` and push the tag to the GitHub mirror
# (`git push pub-mirror vX.Y.Z`); this workflow builds and publishes.
#
# `build` (and therefore `publish`) is gated behind `test`, which runs
# the bundled pytest suite across every Python version this package
# claims to support (pyproject.toml classifiers) — a tag push whose
# tests fail never reaches PyPI.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: python -m pip install -e .[test]

      - name: Run tests
        run: pytest

  build:
    name: Build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
